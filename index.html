<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 900px; }
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #ff8c00;
            padding-bottom: 20px;
        }
        h1 { margin: 0; font-size: 28pt; text-transform: uppercase; }
        h1 span { color: #ff8c00; }
        
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        th {
            background-color: #ff8c00;
            color: #000;
            padding: 15px;
            text-align: left;
        }
        tr.data-row { background-color: #1a1a1a; }
        td { padding: 15px; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        
        /* Rank Highlighting */
        .rank-1 { background-color: #2c1e0a !important; border: 1px solid #ff8c00; }
        .rank-2 { background-color: #241a0a !important; }
        .rank-3 { background-color: #1e160a !important; }

        .footer { margin-top: 50px; text-align: center; color: #666; font-size: 10pt; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Advent of Puzzle <span>Leaderboard</span></h1>
    </div>

    <table id="leaderboard">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Roll No</th>
                <th>Name</th>
                <th>28th May's Score</th>
                <th>Total Score</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>

    <div class="footer">
        Upskill today. Conquer everyday.
    </div>
</div>

<script>
    async function loadLeaderboard() {
        try {
            // This fetches the file from the same folder
            const response = await fetch('universal.csv');
            if (!response.ok) throw new Error("CSV file not found");
            
            const data = await response.text();
            const rows = data.split('\n').filter(row => row.trim() !== '');
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';

            // i = 1 to skip the header row of your CSV
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',');
                if (cols.length >= 5) {
                    const tr = document.createElement('tr');
                    tr.className = 'data-row';
                    
                    const rank = parseInt(cols[0]);
                    if (rank === 1) tr.classList.add('rank-1');
                    if (rank === 2) tr.classList.add('rank-2');
                    if (rank === 3) tr.classList.add('rank-3');

                    tr.innerHTML = `
                        <td>${cols[0]}</td>
                        <td>${cols[1]}</td>
                        <td>${cols[2]}</td>
                        <td>${cols[3]}</td>
                        <td>${cols[4]}</td>
                    `;
                    tableBody.appendChild(tr);
                }
            }
        } catch (error) {
            console.error(error);
            document.getElementById('table-body').innerHTML = "<tr><td colspan='5'>Error loading leaderboard. Ensure universal.csv is in the folder.</td></tr>";
        }
    }

    loadLeaderboard();
</script>
</body>
</html>
